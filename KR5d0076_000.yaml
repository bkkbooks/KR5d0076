front:
  text: 吳尊師傳
  hash: sha256:2026e57eb5571464de32e537a844f58a75b317ba840a69a01076c593624a5668
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0076_HFL_000-001a, image: hfl/0727/0727-086.png}
body:
  text: 吳筠字貞節魯中儒士也少通經善屬文舉進士不第性高潔不伍流俗乃入嵩山依體玄先生潘師正為道士傳正一之法苦心鑽仰盡通其術開元中南遊金陵訪道茅山久之東遊天台筠尤善著述在剡與越中文士為詩酒之會所著歌篇傳於京師玄宗聞其名遣使徵之既至與語甚悅令待詔翰林帝問以道法對曰道法之精無如五千言其諸枝詞蔓説徒費紙劄爾又問神仙修鍊之事對曰此野人之事當以歲月功行求之非人主所當適意每與緇黃列坐朝臣啓奏筠之所陳但名教世務而巳間之以諷詠以達其誠玄宗深重之天寶中李林甫楊國忠用事綱紀日紊筠知天下將亂堅求還嵩山纍表不許乃詔於嶽觀别立道院祿山將亂求還茅山許之既而中原大亂江淮多盜乃東遊會稽常於天台剡中往來與詩人李白孔巢父詩篇酬和逍遙泉石人多從之竟終越中文集二十卷其玄綱三篇神仙可學論尤為達識之士所稱凡為文詞理宏通文彩焕發每製一篇人皆傳寫雖李白之放蕩杜甫之壯麗能兼之者其唯筠乎唐禮部尚書權德輿撰
  hash: sha256:49a07acad8963a0e20fc5e2a2009fa8ec08e3d5526239f390817c3c12d78ce71
